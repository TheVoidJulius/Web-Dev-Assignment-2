!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <div class="app">

        
        <header class="topbar">
            <div class="logo">
                <span class="logo-icon">◈</span>
                <span class="logo-text">ASYNC WEATHER TRACKER</span>
            </div>
            <div class="search-wrap">
                <input id="cityInput" type="text" placeholder="Search city…" autocomplete="off">
                <button id="searchBtn">
                   
                </button>
            </div>
        </header>

        
        <main class="main">

            
            <section class="weather-panel">

                
                <div class="hero" id="hero">
                    <div class="hero-placeholder">
                        <p class="placeholder-icon">🌐</p>
                        <p class="placeholder-text">Search a city to begin</p>
                    </div>
                </div>

                
                <div class="detail-grid" id="detailGrid"></div>

            </section>

            
            <aside class="sidebar">
                <div class="sidebar-title">
                    <span class="dot"></span> RECENT
                </div>
                <div id="history" class="history-list"></div>
            </aside>

        </main>

    </div>

    <script src="script.js"></script>
</body>
</html>
